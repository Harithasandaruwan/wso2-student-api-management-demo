<!DOCTYPE html>
<html>
<head>
  <title>WSO2 Student API Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f5f7fb;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      color: #1f4e79;
    }

    .token-wrapper {
      position: relative;
      margin-top: 10px;
    }

    #token {
      width: 100%;
      height: 100px;
      padding: 10px 45px 10px 10px;
      box-sizing: border-box;
      font-family: monospace;
      resize: vertical;
    }

    .eye-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 20px;
    }

    button.action-btn {
      margin-top: 15px;
      padding: 12px 20px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button.action-btn:hover {
      background: #005fa3;
    }

    pre {
      background: #111827;
      color: #22c55e;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 20px;
    }

    .note {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WSO2 Student API Demo</h1>

    <p>This frontend calls the StudentAPI through WSO2 API Manager Gateway.</p>

    <label>Access Token:</label>

    <div class="token-wrapper">
      <textarea id="token" placeholder="Paste WSO2 access token here"></textarea>
      <button class="eye-btn" onclick="toggleToken()" title="Show/Hide Token">👁️</button>
    </div>

    <p class="note">Token is hidden by default for safer screenshots and demos.</p>

    <button class="action-btn" onclick="getStudents()">Get Students</button>

    <pre id="result">Response will appear here...</pre>
  </div>

  <script>
    const tokenInput = document.getElementById("token");

    let realToken = "";
    let tokenVisible = false;

    tokenInput.addEventListener("input", function () {
      if (tokenVisible) {
        realToken = tokenInput.value;
      } else {
        realToken = tokenInput.value;
        maskToken();
      }
    });

    function maskToken() {
      if (!realToken) {
        tokenInput.value = "";
        return;
      }

      const start = realToken.substring(0, 12);
      const end = realToken.substring(realToken.length - 8);

      tokenInput.value = `${start}***************${end}`;
    }

    function toggleToken() {
      tokenVisible = !tokenVisible;

      if (tokenVisible) {
        tokenInput.value = realToken;
      } else {
        maskToken();
      }
    }

    async function getStudents() {
      const result = document.getElementById("result");

      if (!realToken) {
        result.textContent = "Please paste the access token first.";
        return;
      }

      try {
        const response = await fetch("https://localhost:8243/student/1.0.0/students", {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + realToken
          }
        });

        const data = await response.json();
        result.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        result.textContent = "Error: " + error.message;
      }
    }
  </script>
</body>
</html>
